<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nestgo · AI Property Management</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@huggingface/inference@2.0.0/dist/index.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f4f6fa; }
        .login-card { background: white; border-radius: 2rem; box-shadow: 0 24px 48px rgba(0,0,0,0.15); }
        .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 1.1rem; }
        .password-toggle:hover { color: #1e293b; }
        .password-wrapper { position: relative; }
        .bg-login { background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        #app.hidden { display: none !important; }
        #loginModal.hidden { display: none !important; }
        .progressive-card { transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
        .progressive-card .expanded-content { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease; }
        .progressive-card.expanded .expanded-content { max-height: 800px; opacity: 1; margin-top: 1rem; }
        .progressive-card .summary { cursor: pointer; transition: background 0.15s ease; }
        .progressive-card .summary:hover { background: rgba(43, 108, 176, 0.04); }
        .priority-high { background: #fee2e2; color: #b91c1c; }
        .priority-medium { background: #fef3c7; color: #92400e; }
        .priority-low { background: #d1fae5; color: #065f46; }
        .sentiment-negative { border-left: 4px solid #dc2626; }
        .sentiment-neutral { border-left: 4px solid #f59e0b; }
        .sentiment-positive { border-left: 4px solid #16a34a; }
        .mode-toggle button { transition: all 0.2s ease; }
        .mode-toggle .active-tenant { background: #1a365d; color: white; box-shadow: 0 4px 12px rgba(26,54,93,0.3); }
        .mode-toggle .active-landlord { background: #2b6cb0; color: white; box-shadow: 0 4px 12px rgba(43,108,176,0.3); }
        .scenario-btn { transition: all 0.2s ease; }
        .scenario-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .toast { animation: toastIn 0.4s ease forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .search-expand .advanced-filters { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease; }
        .search-expand.open .advanced-filters { max-height: 400px; opacity: 1; margin-top: 1rem; }
        .typing-dot { animation: typingBounce 1.4s infinite both; }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
        .log-entry { animation: logSlide 0.25s ease forwards; opacity: 0; transform: translateX(-8px); }
        @keyframes logSlide { to { opacity: 1; transform: translateX(0); } }
        .badge-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .glass-panel { background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); }
        .bg-grid { background-image: radial-gradient(circle at 20% 50%, rgba(43,108,176,0.03) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(26,54,93,0.04) 0%, transparent 50%); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .message-bubble { transition: all 0.2s ease; }
        .message-bubble:hover { transform: scale(1.01); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 9999; animation: fadeIn 0.2s ease; }
        .modal-content { background: white; max-width: 700px; width: 95%; max-height: 90vh; overflow-y: auto; border-radius: 2rem; padding: 2rem; box-shadow: 0 24px 48px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .tenant-tab { cursor: pointer; padding: 0.5rem 1.5rem; border-radius: 9999px; font-weight: 500; transition: all 0.2s; }
        .tenant-tab.active { background: #1a365d; color: white; box-shadow: 0 4px 12px rgba(26,54,93,0.3); }
        .tenant-tab:not(.active):hover { background: #e2e8f0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .ticket-scroll { max-height: 420px; overflow-y: auto; padding-right: 4px; }
        .ticket-scroll::-webkit-scrollbar { width: 4px; }
        .ticket-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .property-card { transition: all 0.2s ease; cursor: pointer; }
        .property-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .property-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 1rem 1rem 0 0; }
        #loginModal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 10000; animation: fadeIn 0.2s ease; }
        #loginModal.hidden { display: none !important; }
        .login-modal-card { background: white; max-width: 420px; width: 90%; border-radius: 2rem; padding: 2.5rem; box-shadow: 0 24px 48px rgba(0,0,0,0.3); animation: slideUp 0.3s ease; }
        #publicView { padding: 2rem 0; }
        .search-bar { max-width: 600px; margin: 0 auto 2rem; }
        .recommendation-card { background: linear-gradient(135deg, #1a365d, #2b6cb0); color: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; }
        .recommendation-card input, .recommendation-card select { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 0.75rem; padding: 0.75rem 1rem; width: 100%; outline: none; }
        .recommendation-card input::placeholder { color: rgba(255,255,255,0.6); }
        .recommendation-card select option { color: #1a365d; }
        .chat-messages { max-height: 400px; overflow-y: auto; background: #f8fafc; border-radius: 1rem; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .chat-message { padding: 0.5rem 1rem; border-radius: 1rem; max-width: 80%; word-wrap: break-word; }
        .chat-message.tenant { background: #1a365d; color: white; align-self: flex-end; }
        .chat-message.landlord { background: #e2e8f0; color: #1a365d; align-self: flex-start; }
        .chat-message.notice { background: #fef3c7; color: #92400e; align-self: center; text-align: center; max-width: 90%; border: 1px dashed #f59e0b; }
        .tenant-list-item { cursor: pointer; transition: all 0.15s ease; }
        .tenant-list-item:hover { background: #f1f5f9; }
        .property-status { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 9999px; }
        .property-status.available { background: #d1fae5; color: #065f46; }
        .property-status.rented { background: #fee2e2; color: #991b1b; }
        /* small fix for ticket reply button */
        .reply-btn { background: #2b6cb0; color: white; padding: 0.25rem 0.75rem; border-radius: 0.75rem; font-size: 0.75rem; transition: all 0.15s; }
        .reply-btn:hover { background: #1a4f7a; }
    </style>
</head>
<body>

    <!-- ===== LOGIN MODAL ===== -->
    <div id="loginModal" class="hidden">
        <div class="login-modal-card">
            <div class="text-center mb-6">
                <div class="inline-block w-16 h-16 rounded-2xl bg-gradient-to-br from-[#1a365d] to-[#2b6cb0] text-white text-3xl font-bold flex items-center justify-center shadow-lg mx-auto mb-3">N</div>
                <h1 class="text-2xl font-bold text-gray-800">Sign In</h1>
                <p class="text-sm text-gray-500 mt-1">Enter your credentials</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                    <input type="email" id="loginEmailModal" placeholder="Enter your email" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#2b6cb0] focus:border-transparent outline-none transition" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPasswordModal" placeholder="Enter your password" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#2b6cb0] focus:border-transparent outline-none transition pr-12" />
                        <button type="button" id="togglePasswordModal" class="password-toggle">👁️</button>
                    </div>
                </div>
                <button onclick="handleLoginModal()" class="w-full bg-[#1a365d] text-white py-3 rounded-xl font-medium hover:bg-[#2b4a7a] transition shadow-sm text-base">Sign In</button>
                <button onclick="closeLoginModal()" class="w-full text-sm text-gray-400 hover:text-gray-600 underline">Cancel</button>
            </div>
            <div id="loginErrorModal" class="mt-4 text-sm text-red-600 hidden text-center bg-red-50 p-2 rounded-lg border border-red-200">❌ Invalid email or password. Please try again.</div>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div id="app">
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-200/60 sticky top-0 z-50 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex flex-wrap items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-[#1a365d] to-[#2b6cb0] flex items-center justify-center text-white font-bold text-lg shadow-md">N</div>
                    <span class="text-xl font-bold text-[#1a365d] tracking-tight">Nestgo</span>
                    <span class="text-[10px] font-medium text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">prototype</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="hidden sm:inline text-sm text-gray-500">⚡ AI <span class="font-medium text-green-600">active</span></span>
                    <span class="w-2 h-2 rounded-full bg-green-500 badge-pulse"></span>
                    <div id="authControls"><button onclick="openLoginModal()" class="text-sm bg-[#1a365d] text-white px-4 py-1.5 rounded-lg hover:bg-[#2b4a7a] transition">Login</button></div>
                    <div id="userControls" class="hidden flex items-center gap-2">
                        <span id="userNameDisplay" class="text-sm font-medium text-gray-700"></span>
                        <button onclick="logout()" class="text-xs text-red-500 hover:text-red-700 font-medium">Logout</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- PUBLIC VIEW -->
        <div id="publicView">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                <div class="recommendation-card">
                    <div class="flex items-center gap-2 mb-3"><span class="text-2xl">🤖</span><h2 class="text-xl font-bold">AI Property Recommender</h2></div>
                    <p class="text-sm opacity-80 mb-3">Tell us what you're looking for and our AI will find the best matches.</p>
                    <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
                        <input type="text" id="aiPrefLocation" placeholder="Location (e.g. Westlands)" class="bg-white/20 border border-white/20 rounded-xl px-4 py-2 text-white placeholder-white/60 outline-none" />
                        <select id="aiPrefBedrooms" class="bg-white/20 border border-white/20 rounded-xl px-4 py-2 text-white outline-none">
                            <option value="any">Any bedrooms</option>
                            <option value="1">1 bedroom</option>
                            <option value="2">2 bedrooms</option>
                            <option value="3">3 bedrooms</option>
                            <option value="4">4+ bedrooms</option>
                        </select>
                        <select id="aiPrefBudget" class="bg-white/20 border border-white/20 rounded-xl px-4 py-2 text-white outline-none">
                            <option value="any">Any budget</option>
                            <option value="20000">Under KSh 20k</option>
                            <option value="30000">Under KSh 30k</option>
                            <option value="50000">Under KSh 50k</option>
                            <option value="80000">Under KSh 80k</option>
                            <option value="120000">Under KSh 120k</option>
                            <option value="200000">Under KSh 200k</option>
                        </select>
                        <button onclick="runAIRecommendation()" class="bg-white text-[#1a365d] px-4 py-2 rounded-xl font-medium hover:bg-gray-100 transition">🔍 Find Best Match</button>
                    </div>
                    <div id="aiRecommendationResult" class="mt-3 text-sm"></div>
                </div>
                <div class="search-bar"><input type="text" id="searchInputPublic" placeholder="Search for a home..." class="w-full border border-gray-300 rounded-xl px-5 py-3 text-sm focus:ring-2 focus:ring-[#2b6cb0] focus:border-transparent outline-none" oninput="renderPublicView()" /></div>
                <div id="propertyGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 hidden"></div>

        <!-- MODALS -->
        <div id="propertyModal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="propertyModalTitle" class="text-2xl font-bold text-gray-800">Property</h2>
                    <button onclick="closePropertyModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
                </div>
                <div id="propertyModalBody" class="space-y-4 text-sm"></div>
            </div>
        </div>

        <div id="bookingModal" class="modal-overlay hidden">
            <div class="modal-content max-w-md">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">📅 Book This Property</h2>
                    <button onclick="closeBookingModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
                </div>
                <form id="bookingForm" onsubmit="submitBooking(event)">
                    <div class="space-y-3">
                        <input type="text" id="bookingName" placeholder="Full Name" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[#2b6cb0] outline-none" />
                        <input type="email" id="bookingEmail" placeholder="Email Address" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[#2b6cb0] outline-none" />
                        <input type="tel" id="bookingPhone" placeholder="Phone Number" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[#2b6cb0] outline-none" />
                        <textarea id="bookingMessage" rows="3" placeholder="Additional message or questions..." class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[#2b6cb0] outline-none"></textarea>
                        <button type="submit" class="w-full bg-[#1a365d] text-white py-3 rounded-xl font-medium hover:bg-[#2b4a7a] transition">Submit Booking Request</button>
                    </div>
                </form>
                <div id="bookingResponse" class="mt-3 text-sm text-center"></div>
            </div>
        </div>

        <div id="chatModal" class="modal-overlay hidden">
            <div class="modal-content max-w-lg">
                <div class="flex justify-between items-center mb-3">
                    <h2 id="chatModalTitle" class="text-xl font-bold text-gray-800">💬 Chat</h2>
                    <button onclick="closeChatModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
                </div>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="flex gap-2 mt-3">
                    <input type="text" id="chatInput" placeholder="Type a message..." class="flex-1 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[#2b6cb0] outline-none" onkeydown="if(event.key==='Enter') sendChatMessage()" />
                    <button onclick="sendChatMessage()" class="bg-[#2b6cb0] text-white px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-[#1a4f7a] transition">Send</button>
                </div>
                <div id="chatTyping" class="hidden text-xs text-gray-400 mt-1">AI analyzing sentiment...</div>
            </div>
        </div>

        <div id="ticketModal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">🔍 Ticket Details</h2>
                    <button onclick="closeTicketModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
                </div>
                <div id="ticketModalBody" class="space-y-3 text-sm"></div>
            </div>
        </div>

        <div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-2 max-w-sm w-full pointer-events-none"></div>
    </div>

    <script>
        // ============================================================
        //  GENERATE USERS & PROPERTIES (8 landlords, 50 tenants, 120+ props)
        // ============================================================
        const LOCATIONS = [
            'Westlands', 'Kilimani', 'Lavington', 'Kileleshwa', 'Runda', 'Parklands',
            'Karen', 'Langata', 'Kasarani', 'Embakasi', 'Ruiru', 'Thika Road',
            'Muthaiga', 'Nyari', 'Gigiri', 'Hurlingham', 'Highridge', 'Kitisuru',
            'Spring Valley', 'Riverside', 'Milimani', 'Pangani', 'South B', 'South C',
            'Buruburu', 'Donholm', 'Umoja', 'Tena', 'Kamulu', 'Ruaka',
            'Kiambu Road', 'Limuru Road', 'Ngong Road', 'Thika', 'Kiambu'
        ];

        const HOUSE_PHOTOS = [
            'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1583608205776-bfd35f0d9f83?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1523217582562-09d0def993a6?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1449844908441-8829872d2607?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1513885539751-59f39d6b5e8d?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1480074568708-e7b720bb3f09?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1515263487990-61b07816b324?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1582268611958-ebfd161ef9cf?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1576941089067-2de3c901e126?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1585336261022-680e295ce3fe?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1574362848149-11496d93a7c7?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1588880331179-bc9b93a8cb5e?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1560185127-6ed189bf02f4?w=600&h=400&fit=crop',
            'https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=600&h=400&fit=crop'
        ];

        function getPropertyPhoto(id) { return HOUSE_PHOTOS[id % HOUSE_PHOTOS.length]; }

        // Generate 8 landlords with unique names
        const landlordNames = [
            'James Mwangi', 'Grace Akinyi', 'David Ochieng', 'Sarah Wanjiku',
            'Michael Odhiambo', 'Esther Nyambura', 'Peter Kiprop', 'Mary Atieno'
        ];
        const landlords = [];
        for (let i = 0; i < 8; i++) {
            landlords.push({
                id: i + 1,
                email: `landlord${i+1}@nestgo.com`,
                password: 'pass123',
                role: 'landlord',
                name: landlordNames[i % landlordNames.length]
            });
        }

        // Generate 50 tenants with unique names
        const firstNames = ['Alice', 'Brian', 'Cynthia', 'David', 'Emily', 'Frank', 'Grace', 'Henry', 'Irene', 'John',
            'Kevin', 'Lillian', 'Mark', 'Nancy', 'Oscar', 'Paul', 'Quinn', 'Rose', 'Samuel', 'Tina',
            'Ulysses', 'Victoria', 'William', 'Xavier', 'Yvonne', 'Zachary', 'Amanda', 'Benjamin', 'Carol', 'Daniel',
            'Eunice', 'Felix', 'Gloria', 'Harrison', 'Isabella', 'Jack', 'Katherine', 'Lewis', 'Monica', 'Nathan',
            'Olivia', 'Patrick', 'Rebecca', 'Stephen', 'Teresa', 'Ursula', 'Vivian', 'Walter', 'Xena', 'Yolanda'
        ];
        const lastNames = ['Wanjiru', 'Ochieng', 'Mwangi', 'Akinyi', 'Odhiambo', 'Nyambura', 'Kiprop', 'Atieno',
            'Kamau', 'Njoroge', 'Kariuki', 'Muthoni', 'Kimani', 'Achieng', 'Otieno', 'Mwaura', 'Wambui', 'Omondi',
            'Wanjiku', 'Owuor'
        ];

        function getRandomName() {
            const f = firstNames[Math.floor(Math.random() * firstNames.length)];
            const l = lastNames[Math.floor(Math.random() * lastNames.length)];
            return `${f} ${l}`;
        }

        const tenants = [];
        for (let i = 0; i < 50; i++) {
            const name = getRandomName();

        function simulatePriority(desc) {
            const l = desc.toLowerCase();
            let s = 0;
            if (l.includes('burst') || l.includes('pipe') || l.includes('flood') || l.includes('water everywhere') || l
                .includes('gas leak') || l.includes('emergency') || l.includes('no heating') || l.includes('freezing'))
                s += 3;
            if (l.includes('drip') || l.includes('leak') || l.includes('noisy') || l.includes('broken') || l.includes(
                'not working') || l.includes('stuck')) s += 1.5;
            if (l.includes('!!') || l.includes('urgent') || l.includes('asap') || l.includes('immediately')) s += 2;
            return s >= 4 ? 'high' : s >= 2 ? 'medium' : 'low';
        }

        function simulateCategory(desc) {
            const l = desc.toLowerCase();
            if (l.includes('pipe') || l.includes('plumb') || l.includes('faucet') || l.includes('drain') || l.includes(
                'toilet') || l.includes('water')) return 'Plumbing';
            if (l.includes('heat') || l.includes('hvac') || l.includes('ac') || l.includes('air') || l.includes(
                'thermostat')) return 'HVAC';
            if (l.includes('electrical') || l.includes('wire') || l.includes('light') || l.includes('outlet'))
                return 'Electrical';
            if (l.includes('roof') || l.includes('ceiling') || l.includes('wall') || l.includes('floor'))
                return 'Structural';
            return 'Maintenance';
        }

        function fallbackResponse(desc, priority) {
            if (priority === 'high') return '🚨 Emergency response initiated. Technician dispatched, ETA 30 min.';
            if (priority === 'medium') return '📋 Issue logged. Team will contact within 24 hours.';
            return '✅ Request received. Will be addressed within 48 hours.';
        }

        function simulateTriage(desc) {
            const priority = simulatePriority(desc);

        async function callSentimentAPI(text) {
            if (hf) {
                try {
                    const result = await hf.textClassification({ model: 'distilbert-base-uncased-finetuned-sst-2-english',
                        inputs: text });
                    const label = result[0].label;
                    const score = result[0].score;
                    return label === 'POSITIVE' ? score : -score;
                } catch (e) { return simulateSentiment(text); }
            }
            return simulateSentiment(text);

        function simulateSentiment(text) {
            const l = text.toLowerCase();
            let n = 0,
                p = 0;
            ['awful', 'terrible', 'horrible', 'furious', 'angry', 'unacceptable', 'frustrated', 'urgent', 'emergency',
                'broken', 'failing', 'worst', 'nothing', 'ignored', 'useless', 'bad', 'poor', 'hate', 'disgusting',
                'disaster', 'nightmare', 'ridiculous', 'outrageous', 'livid'
            ].forEach(w => { if (l.includes(w)) n++; });
            ['great', 'excellent', 'amazing', 'wonderful', 'perfect', 'love', 'thank', 'thanks', 'appreciate', 'beautiful',
                'fantastic', 'good', 'best', 'happy', 'pleased', 'delighted', 'enjoy', 'satisfied', 'brilliant', 'awesome',
                'incredible', 'lovely', 'nice', 'superb', 'terrific'
            ].forEach(w => { if (l.includes(w)) p++; });
            if (l.includes('!!!')) n += 1.5;
            if (l.includes('!!')) n += 0.8;
            if (l.includes('urgent') || l.includes('emergency') || l.includes('asap')) n += 1;
            const total = n + p || 1;
            let score = (p - n) / total;
            score = Math.max(-1, Math.min(1, score));
            return score;
        }

        function openLoginModal() { document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('loginErrorModal').classList.add('hidden'); }

        function closeLoginModal() { document.getElementById('loginModal').classList.add('hidden'); }

        window.handleLoginModal = function() {
            const email = document.getElementById('loginEmailModal').value.trim();
            const password = document.getElementById('loginPasswordModal').value.trim();
            const errorDiv = document.getElementById('loginErrorModal');
            const user = USERS.find(u => u.email === email && u.password === password);
            if (!user) { errorDiv.classList.remove('hidden');
                showToast('❌ Invalid credentials', 'error'); return; }
            errorDiv.classList.add('hidden');
            state.currentUser = user;
            state.loggedIn = true;
            state.mode = user.role;
            closeLoginModal();
            showToast(`✅ Welcome ${user.name}`, 'success');
            renderDashboard();
        };

        function logout() {
            state.loggedIn = false;
            state.currentUser = null;
            state.mode = 'public';
            document.getElementById('dashboard').innerHTML = '';
            renderDashboard();
            showToast('👋 Logged out', 'info');
        }

        // ============================================================
        //  DASHBOARD RENDER
        // ============================================================
        function renderDashboard() {
            const dashboard = document.getElementById('dashboard');
            const publicView = document.getElementById('publicView');
            const authControls = document.getElementById('authControls');
            const userControls = document.getElementById('userControls');
            const userNameDisplay = document.getElementById('userNameDisplay');

            if (!state.loggedIn || !state.currentUser) {
                publicView.classList.remove('hidden');
                dashboard.classList.add('hidden');
                authControls.classList.remove('hidden');
                userControls.classList.add('hidden');
                renderPublicView();
                return;
            }

            publicView.classList.add('hidden');
            dashboard.classList.remove('hidden');
            authControls.classList.add('hidden');
            userControls.classList.remove('hidden');
            userNameDisplay.textContent = state.currentUser.name;

            const user = state.currentUser;
            if (user.role === 'tenant') renderTenantDashboard(user);
            else renderLandlordDashboard(user);
        }

        // ============================================================

        // ============================================================

                '<div class="text-sm text-gray-400 py-2">No tickets yet.</div>' :
                tickets.map(t => `

                        <div class="flex-1 min-w-0">

        function renderLandlordTickets(filteredTickets) {
            const container = document.getElementById('landlordTickets');
            if (!container) return;
            const sorted = [...filteredTickets].sort((a, b) => ({ high: 0, medium: 1, low: 2 } [a.priority] - { high: 0,
                medium: 1, low: 2 } [b.priority]));
            container.innerHTML = sorted.length === 0 ?
                '<div class="text-sm text-gray-400 py-2">No tickets from your tenants.</div>' :
                sorted.map(t => {
                    const tenantName = getTenantName(t.tenantId) || t.tenantName || 'Unknown';
                    return `
                        <div class="bg-white/70 rounded-xl p-3 border border-gray-200/50 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <span class="text-xs font-medium ${t.priority === 'high' ? 'priority-high' : t.priority === 'medium' ? 'priority-medium' : 'priority-low'} px-2 py-0.5 rounded-full">${t.priority.charAt(0).toUpperCase() + t.priority.slice(1)}</span>
                                    <span class="text-xs text-gray-400">${t.category}</span>
                                    <span class="text-xs text-gray-400">•</span>
                                    <span class="text-xs text-gray-400">${t.status || 'Pending'}</span>
                                    <span class="text-xs text-gray-400">•</span>
                                    <span class="text-xs text-gray-400">${tenantName}</span>
                                </div>

                                ${t.response ? `<p class="text-xs text-gray-500 mt-1">🤖 ${t.response}</p>` : ''}
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                <span class="text-xs text-gray-400">${timeAgo(t.createdAt)}</span>
                                <button onclick="openTicketModal(${t.id})" class="text-xs text-[#2b6cb0] font-medium hover:underline">Details</button>
                                <button onclick="quickReplyToTicket(${t.id})" class="reply-btn">💬 Reply</button>
                            </div>
                        </div>
                    `;
                }).join('');
        }

        // Quick reply: open chat with the tenant who created the ticket
        function quickReplyToTicket(ticketId) {
            const ticket = state.tickets.find(t => t.id === ticketId);
            if (!ticket) { showToast('Ticket not found.', 'error'); return; }
            const tenantId = ticket.tenantId;
            if (!tenantId) { showToast('Tenant ID missing.', 'error'); return; }
            const tenant = tenants.find(t => t.id === tenantId);
            if (!tenant) { showToast('Tenant not found.', 'error'); return; }
            openChatWithTenant(tenantId);
        }

        // ============================================================
        //  UPDATE FOR TICKET CREATION (store tenantId)
        // ============================================================
        async function submitMaintenance() {
            const input = document.getElementById('newTicketDesc');
            if (!input) return;
            const desc = input.value.trim();
            if (!desc) { showToast('Please describe the issue.', 'warning'); return; }
            const btn = document.getElementById('submitTicketBtn');
            if (btn) { btn.disabled = true;
                btn.textContent = 'Submitting...'; }
            const typing = document.getElementById('ticketTypingIndicator');
            if (typing) typing.classList.remove('hidden');
            try {
                const analysis = await AIAgent.triage(desc);
                const ticket = {
                    id: state.nextTicketId++,
                    description: desc,
                    priority: analysis.priority,
                    category: analysis.category,
                    status: 'Pending',
                    createdAt: new Date(),
                    tenantId: state.currentUser ? state.currentUser.id : null,
                    tenantName: state.currentUser ? state.currentUser.name : 'Unknown',
                    response: analysis.response,
                    analysis
                };
                state.tickets.push(ticket);
                renderDashboard();
                showToast(`✅ Submitted! ${analysis.priority.toUpperCase()} priority`, 'success');
                input.value = '';
            } catch (e) { showToast('❌ Error submitting ticket.', 'error'); } finally {
                if (btn) { btn.disabled = false;
                    btn.textContent = 'Submit request'; }
                if (typing) typing.classList.add('hidden');
            }
        }

        async function quickTicket(desc) {
            const typing = document.getElementById('ticketTypingIndicator');
            if (typing) typing.classList.remove('hidden');
            try {
                const analysis = await AIAgent.triage(desc);
                const ticket = {
                    id: state.nextTicketId++,
                    description: desc,
                    priority: analysis.priority,
                    category: analysis.category,
                    status: 'Pending',
                    createdAt: new Date(),
                    tenantId: state.currentUser ? state.currentUser.id : null,
                    tenantName: state.currentUser ? state.currentUser.name : 'Unknown',
                    response: analysis.response,
                    analysis
                };
                state.tickets.push(ticket);
                renderDashboard();
                showToast(`📋 Quick ticket: ${analysis.priority.toUpperCase()} priority`, 'info');
            } catch (e) { showToast('❌ Error.', 'error'); } finally { if (typing) typing.classList.add('hidden'); }
        }

        // Update message sending to store tenantId
        // When a tenant sends a message (via chat), we already store in state.chats.
        // For messages in the feed (from tenant to landlord via the chat or quick message), we need to store in state.messages as well?
        // In the landlord dashboard, we display messages from state.messages. We'll need to add messages from chat to state.messages when they are sent by tenants.
        // We'll adapt: when a tenant sends a chat message to landlord, we can also push a message to state.messages if it's a direct message from tenant to landlord.
        // For simplicity, we'll just rely on the chat system; the landlord can see messages in the chat modal. But the requirement was to show tenant messages in the landlord dashboard feed.
        // So we'll also add messages to state.messages when a tenant sends a message via chat to their landlord.
        // We'll modify the sendChatMessage function: if the sender is a tenant (state.currentUser.role === 'tenant') and recipient is landlord, we push to state.messages.
        // We'll also keep the existing quickMessage function that adds to state.messages for testing.

        // Patch sendChatMessage to also add to landlord feed
        const originalSendChatMessage = sendChatMessage;
        sendChatMessage = async function() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            const key = `chat_${chatRecipientType}_${chatRecipientId || 'notice'}`;
            if (!state.chats[key]) state.chats[key] = [];
            const sender = state.currentUser ? state.currentUser.name : 'User';
            state.chats[key].push({ sender, text, time: new Date().toISOString() });
            saveState();
            renderChatMessages(chatRecipientId, chatRecipientType);
            input.value = '';

            // If tenant sending to landlord, add to state.messages for landlord feed
            if (state.currentUser && state.currentUser.role === 'tenant' && chatRecipientType === 'landlord') {
                // find landlord ID
                const landlord = landlords.find(l => l.id === chatRecipientId);
                if (landlord) {
                    const sentiment = await AIAgent.analyzeSentiment(text);
                    state.messages.push({
                        id: state.nextMsgId++,
                        text: text,
                        sentiment: sentiment.score,
                        flagged: sentiment.flagged,
                        tenantId: state.currentUser.id,
                        tenantName: state.currentUser.name,
                        time: new Date()
                    });
                    saveState();
                    // Re-render landlord dashboard if currently in landlord view
                    if (state.mode === 'landlord') renderDashboard();
                }
            }

            if (chatMode === 'notice') {
                const noticeKey = 'notice_all';
                if (!state.chats[noticeKey]) state.chats[noticeKey] = [];
                state.chats[noticeKey].push({ sender: 'notice', text: `📢 ${text}`, time: new Date().toISOString() });
                saveState();
                showToast('📢 General notice sent to all tenants.', 'success');
                return;
            }

            const typing = document.getElementById('chatTyping');
            typing.classList.remove('hidden');
            const sentiment = await AIAgent.analyzeSentiment(text);
            setTimeout(() => {
                let reply = '';
                if (chatRecipientType === 'landlord') {
                    const replies = [
                        'Thank you for your message. I\'ll get back to you shortly.',
                        'I appreciate your query. Let me check and get back to you.',
                        'Great! I\'ll look into it right away.',
                        'Thanks for reaching out. I\'ll respond as soon as possible.'
                    ];
                    reply = replies[Math.floor(Math.random() * replies.length)];
                } else if (chatRecipientType === 'tenant') {
                    const replies = [
                        'Thanks for your message. I\'ll address it promptly.',
                        'I understand. Let me see what I can do.',
                        'Appreciate your communication. I\'ll get back to you.',
                        'Noted. I\'ll take care of it.'
                    ];
                    reply = replies[Math.floor(Math.random() * replies.length)];
                }
                if (reply) {
                    const senderName = chatRecipientType === 'landlord' ? getLandlordName(chatRecipientId) : getTenantName(
                        chatRecipientId);
                    state.chats[key].push({ sender: senderName, text: reply, time: new Date().toISOString() });
                    saveState();
                    renderChatMessages(chatRecipientId, chatRecipientType);
                }
                typing.classList.add('hidden');
            }, 1000 + Math.random() * 800);
        };

        // Also for quickMessage testing (tenant messages)
        async function quickMessage(text) {
            try {
                const sentiment = await AIAgent.analyzeSentiment(text);
                const msg = {
                    id: state.nextMsgId++,
                    text,
                    sentiment: sentiment.score,
                    flagged: sentiment.flagged,
                    tenantId: state.currentUser ? state.currentUser.id : null,
                    tenantName: state.currentUser ? state.currentUser.name : 'Test User',
                    time: new Date()
                };
                state.messages.push(msg);
                renderDashboard();
                showToast(`🧪 ${sentiment.label} (${(sentiment.score*100).toFixed(0)}%)`, sentiment.flagged ? 'error' :
                    'success');
            } catch (e) { showToast('❌ Error.', 'error'); }
        }

        // ============================================================
        //  RENDER HELPERS (cont.)
        // ============================================================
        function renderPublicViewTenant() {
            const grid = document.getElementById('propertyGridTenant');
            if (!grid) return;
            const search = document.getElementById('searchInputTenant')?.value?.toLowerCase() || '';
            const filtered = PROPERTIES.filter(p =>
                p.title.toLowerCase().includes(search) ||
                p.location.toLowerCase().includes(search) ||
                p.description.toLowerCase().includes(search)
            );
            grid.innerHTML = filtered.map(p => `
                <div class="property-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-200/50 hover:shadow-md transition" onclick="openPropertyModal(${p.id})">
                    <img src="${p.image}" alt="${p.title}" loading="lazy" />
                    <div class="p-4">
                        <div class="flex justify-between items-start">
                            <h3 class="font-semibold text-gray-800 text-lg truncate">${p.title}</h3>
                            <span class="text-sm font-bold text-[#1a365d]">KSh ${p.price.toLocaleString()}</span>
                        </div>
                        <p class="text-sm text-gray-500">${p.location} · ${p.bedrooms} bed · ${p.sqft} sqft</p>
                        <div class="mt-2 flex items-center gap-2 text-xs">
                            <span class="${p.available ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} px-2 py-0.5 rounded-full">${p.available ? 'Available' : 'Rented'}</span>
                            <span class="text-gray-400 truncate">${getLandlordName(p.landlordId)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateCounts() {
            // For tenant dashboard
            const userTickets = state.tickets.filter(t => t.tenantId === state.currentUser?.id);
            const el = document.getElementById('tenantTicketCount');
            if (el) el.textContent = userTickets.length;
            const badge = document.getElementById('tenantTicketBadge');
            if (badge) badge.textContent = userTickets.length;
            const thc = document.getElementById('tenantHighCount');
            if (thc) thc.textContent = userTickets.filter(t => t.priority === 'high').length;
            const trc = document.getElementById('tenantResolvedCount');
            if (trc) trc.textContent = userTickets.filter(t => t.status === 'Resolved').length;
            // For landlord dashboard (ticket count already set in render)
        }

        // ============================================================
        //  TENANT TABS
        // ============================================================
        function switchTenantTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tenant-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`.tenant-tab[data-tab="${tabId}"]`).classList.add('active');
            if (tabId === 'searchTab') renderPublicViewTenant();
        }

        function toggleTicketSection() {
            const card = document.querySelector('.progressive-card');
            if (card) { card.classList.toggle('expanded'); const c = document.getElementById('ticketChevron'); if (c) c
                    .textContent = card.classList.contains('expanded') ? '▴' : '▾'; }
        }

        function toggleTicketSectionLandlord() {
            const cards = document.querySelectorAll('.progressive-card');
            const card = cards[cards.length - 1];
            if (card) { card.classList.toggle('expanded'); const c = document.getElementById('ticketChevronL'); if (c) c
                    .textContent = card.classList.contains('expanded') ? '▴' : '▾'; }
        }

        // ============================================================
        //  MODAL CLOSE HELPERS
        // ============================================================
        function openTicketModal(id) {
            const ticket = state.tickets.find(t => t.id === id);
            if (!ticket) return;
            const tenantName = getTenantName(ticket.tenantId) || ticket.tenantName || 'Unknown';
            document.getElementById('ticketModalBody').innerHTML = `
                <div><span class="font-semibold">ID:</span> #${ticket.id}</div>
                <div><span class="font-semibold">Description:</span> ${ticket.description}</div>
                <div><span class="font-semibold">Priority:</span> <span class="font-medium ${ticket.priority==='high'?'text-red-600':ticket.priority==='medium'?'text-yellow-600':'text-green-600'}">${ticket.priority.toUpperCase()}</span></div>
                <div><span class="font-semibold">Category:</span> ${ticket.category}</div>
                <div><span class="font-semibold">Status:</span> ${ticket.status||'Pending'}</div>
                <div><span class="font-semibold">Tenant:</span> ${tenantName}</div>
                <div><span class="font-semibold">Reported:</span> ${new Date(ticket.createdAt).toLocaleString()}</div>
                ${ticket.response ? `<div><span class="font-semibold">Auto-response:</span> ${ticket.response}</div>` : ''}
                ${ticket.analysis?.reasoning ? `<div><span class="font-semibold">AI Reasoning:</span> ${ticket.analysis.reasoning}</div>` : ''}
                <div class="mt-4"><button onclick="quickReplyToTicket(${ticket.id})" class="bg-[#2b6cb0] text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-[#1a4f7a] transition">💬 Reply to Tenant</button></div>
            `;
            document.getElementById('ticketModal').classList.remove('hidden');
        }

        function closeTicketModal() { document.getElementById('ticketModal').classList.add('hidden'); }
        document.getElementById('ticketModal').addEventListener('click', function(e) { if (e.target === this)
            closeTicketModal(); });
        document.getElementById('propertyModal').addEventListener('click', function(e) { if (e.target === this)
            closePropertyModal(); });
        document.getElementById('bookingModal').addEventListener('click', function(e) { if (e.target === this)
            closeBookingModal(); });
        document.getElementById('chatModal').addEventListener('click', function(e) { if (e.target === this)
            closeChatModal(); });

        // ============================================================
        //  PASSWORD TOGGLE
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('togglePasswordModal');
            if (btn) btn.addEventListener('click', function() {
                const p = document.getElementById('loginPasswordModal');
                const type = p.getAttribute('type') === 'password' ? 'text' : 'password';
                p.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🙈';
            });
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeLoginModal();
                    closePropertyModal();
                    closeBookingModal();
                    closeChatModal();
                    closeTicketModal(); } });
        });

        // ============================================================
        //  INIT
        // ============================================================
        loadState();

        if (state.tickets.length === 0) {
            // Seed tickets with tenantId (use first few tenants)
            const seedTenants = tenants.slice(0, 5);
            const seed = [
                { id: state.nextTicketId++, description: 'Burst pipe in kitchen, water everywhere!', priority: 'high',
                    category: 'Plumbing', status: 'In progress', createdAt: new Date(Date.now() - 3600000),
                    tenantId: seedTenants[0]?.id, tenantName: seedTenants[0]?.name,
                    response: 'Emergency plumber dispatched. ETA 25 min.' },
                { id: state.nextTicketId++, description: 'Cabinet door handle is loose and keeps falling off.',
                    priority: 'low', category: 'Maintenance', status: 'Pending', createdAt: new Date(Date.now() -
                        86400000), tenantId: seedTenants[1]?.id, tenantName: seedTenants[1]?.name,
                    response: 'Scheduled for next Tuesday.' },
                { id: state.nextTicketId++, description: 'No heating in the living room, it\'s freezing.',
                    priority: 'high', category: 'HVAC', status: 'In progress', createdAt: new Date(Date.now() -
                        7200000), tenantId: seedTenants[2]?.id, tenantName: seedTenants[2]?.name,
                    response: 'HVAC technician en route.' },
                { id: state.nextTicketId++, description: 'Bathroom faucet drips constantly at night.', priority: 'medium',
                    category: 'Plumbing', status: 'Pending', createdAt: new Date(Date.now() - 172800000),
                    tenantId: seedTenants[3]?.id, tenantName: seedTenants[3]?.name,
                    response: 'Parts ordered. Will fix by Friday.' },
            ];
            state.tickets = seed;
        }
        if (state.messages.length === 0) {
            const seedTenants = tenants.slice(0, 5);
            const seedMsg = [
                { id: state.nextMsgId++,
                    text: 'The water heater is making a loud noise and I\'m worried it might break.', sentiment: -0.6,
                    flagged: true, tenantId: seedTenants[0]?.id, tenantName: seedTenants[0]?.name,
                    time: new Date(Date.now() - 1800000) },
                { id: state.nextMsgId++, text: 'The apartment is absolutely perfect! I love the natural light.',
                    sentiment: 0.85, flagged: false, tenantId: seedTenants[1]?.id, tenantName: seedTenants[1]?.name,
                    time: new Date(Date.now() - 7200000) },
                { id: state.nextMsgId++, text: 'This is unacceptable. The roof has been leaking for 3 days!',
                    sentiment: -0.9, flagged: true, tenantId: seedTenants[2]?.id, tenantName: seedTenants[2]?.name,
                    time: new Date(Date.now() - 3600000) },
                { id: state.nextMsgId++, text: 'Thanks for the quick maintenance response yesterday!', sentiment: 0.7,
                    flagged: false, tenantId: seedTenants[3]?.id, tenantName: seedTenants[3]?.name,
                    time: new Date(Date.now() - 14400000) },
            ];
            state.messages = seedMsg;
        }

        renderDashboard();

        console.log('✅ Nestgo fully loaded – 8 landlords, 50 tenants, 120+ properties.');
        console.log('🔑 Tenant: tenant1@nestgo.com / tpass1 | Landlord: landlord1@nestgo.com / pass123');
        console.log('🏠 Rent starts from KSh 20,000. 20+ locations. Real photos.');
        console.log('💬 Landlord dashboard filters tickets/messages by his tenants. Quick reply available.');
        console.log('📅 Click on any property in landlord dashboard to see details.');
    </script>
